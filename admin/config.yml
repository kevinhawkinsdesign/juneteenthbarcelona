backend:
  name: github
  repo: kevinhawkinsdesign/juneteenthbarcelona
  branch: main

media_folder: images
public_folder: /images

collections:
  # ── EVENT DETAILS ──────────────────────────────────────────
  - name: event
    label: "Event Details"
    files:
      - name: event
        label: "Event Details"
        file: _data/event.json
        fields:
          - { label: "Event Title", name: title, widget: string, default: "Juneteenth Barcelona" }
          - { label: "Date", name: date, widget: string, hint: "e.g. Saturday, June 20, 2026" }
          - { label: "Venue Name", name: venue_name, widget: string }
          - { label: "Venue Address", name: venue_address, widget: string }
          - { label: "Venue URL", name: venue_url, widget: string }
          - { label: "Registration / Ticket URL", name: register_url, widget: string, required: false }
          - label: "Schedule"
            name: schedule
            widget: list
            hint: "Add program items one by one"
            fields:
              - { label: "Time", name: time, widget: string, hint: "e.g. 6:00 PM" }
              - { label: "Activity", name: activity, widget: string }
              - { label: "Description", name: description, widget: text, required: false }

  # ── HOME PAGE ─────────────────────────────────────────────
  - name: home_page
    label: "Home Page"
    files:
      - name: home
        label: "Home Page Content"
        file: _data/pages/home.json
        fields:
          - label: "Hero Section"
            name: hero_eyebrow
            widget: string
            hint: "Small text above the main title, e.g. 'Barcelona · June 20, 2026'"
          - { label: "Hero Description", name: hero_desc, widget: text }
          - label: "Next Event Promo"
            name: next_event_tag
            widget: string
            hint: "Tag line, e.g. 'Next Meetup · Monthly Series'"
          - { label: "Next Event Title", name: next_event_title, widget: string }
          - { label: "Next Event Date Pill", name: next_event_date_pill, widget: string, hint: "e.g. March 19" }
          - { label: "Next Event Time", name: next_event_time, widget: string, hint: "e.g. 19:30 – 23:30" }
          - { label: "Next Event Description", name: next_event_desc, widget: text }
          - { label: "Next Event Location", name: next_event_location, widget: string }
          - { label: "Next Event RSVP URL", name: next_event_rsvp_url, widget: string }
          - { label: "Next Event RSVP Button Label", name: next_event_rsvp_label, widget: string }
          - { label: "Next Event Series Note", name: next_event_series_note, widget: string }
          - label: "Intro Section"
            name: intro_tag
            widget: string
          - { label: "Intro Body", name: intro_body, widget: markdown, hint: "The two paragraphs about what Juneteenth is" }
          - { label: "Intro Quote", name: intro_quote, widget: text }
          - { label: "Stat 1 Number", name: stat1_num, widget: string }
          - { label: "Stat 1 Label", name: stat1_label, widget: string }
          - { label: "Stat 2 Number", name: stat2_num, widget: string }
          - { label: "Stat 2 Label", name: stat2_label, widget: string }
          - label: "Walking Tour Section"
            name: wt_tag
            widget: string
          - { label: "Walking Tour Body", name: wt_body, widget: text }

  # ── ABOUT PAGE ────────────────────────────────────────────
  - name: about_page
    label: "About Page"
    files:
      - name: about
        label: "About Page Content"
        file: _data/pages/about.json
        fields:
          - label: "Hero Section"
            name: hero_tag
            widget: string
          - { label: "Hero Title", name: hero_title, widget: string }
          - { label: "Hero Description", name: hero_desc, widget: text }
          - label: "Mission Section"
            name: mission_tag
            widget: string
          - { label: "Mission Label", name: mission_label, widget: string }
          - { label: "Mission Text", name: mission_text, widget: markdown }
          - label: "Story Section"
            name: story_tag
            widget: string
          - { label: "Story Title", name: story_title, widget: string }
          - { label: "Story Body", name: story_body, widget: markdown }
          - label: "Goals Section"
            name: goals_tag
            widget: string
          - { label: "Goals Title", name: goals_title, widget: string }
          - { label: "Goals Intro", name: goals_intro, widget: text }
          - { label: "Goal 1 Title", name: goal1_title, widget: string }
          - { label: "Goal 1 Body", name: goal1_body, widget: text }
          - { label: "Goal 2 Title", name: goal2_title, widget: string }
          - { label: "Goal 2 Body", name: goal2_body, widget: text }
          - { label: "Goal 3 Title", name: goal3_title, widget: string }
          - { label: "Goal 3 Body", name: goal3_body, widget: text }
          - label: "Committee Section"
            name: committee_tag
            widget: string
          - { label: "Committee Title", name: committee_title, widget: string }
          - { label: "Committee Subtitle", name: committee_sub, widget: text }
          - label: "CTA Band"
            name: cta_title
            widget: string
            hint: "Call-to-action title at the bottom"
          - { label: "CTA Subtitle", name: cta_sub, widget: string }
          - { label: "CTA Button Label", name: cta_label, widget: string }
          - { label: "CTA Button URL", name: cta_url, widget: string }

  # ── CONTACT PAGE ──────────────────────────────────────────
  - name: contact_page
    label: "Contact Page"
    files:
      - name: contact
        label: "Contact Page Content"
        file: _data/pages/contact.json
        fields:
          - label: "Hero Section"
            name: hero_tag
            widget: string
          - { label: "Hero Title", name: hero_title, widget: string }
          - label: "Contact Info"
            name: email
            widget: string
            hint: "Contact email address"
          - { label: "Email Sub-text", name: email_sub, widget: string }
          - { label: "Venue Label", name: venue_label, widget: string }
          - { label: "Venue Value", name: venue_value, widget: text }
          - { label: "Venue Sub-text", name: venue_sub, widget: string }
          - { label: "Date Label", name: date_label, widget: string }
          - { label: "Date Value", name: date_value, widget: string }
          - { label: "Date Sub-text", name: date_sub, widget: string }
          - { label: "Ways to Get Involved Title", name: ways_title, widget: string }
          - label: "Form"
            name: form_tag
            widget: string
          - { label: "Form Title", name: form_title, widget: string }
          - { label: "Form Success Message", name: form_success, widget: string }

  # ── ANNOUNCEMENTS / NEWS ───────────────────────────────────
  - name: announcements
    label: "Announcements"
    label_singular: "Announcement"
    folder: _data/announcements
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Date", name: date, widget: datetime }
      - { label: "Summary", name: summary, widget: text, hint: "Short description shown in the list" }
      - { label: "Body", name: body, widget: markdown }
      - { label: "Published", name: published, widget: boolean, default: true }

  # ── EVENT PAGE ────────────────────────────────────────────
  - name: event_page
    label: "Event Page"
    files:
      - name: event
        label: "Event Page Content"
        file: _data/pages/event.json
        fields:
          - { label: "Hero Tagline", name: hero_tagline, widget: string }
          - { label: "Date Value", name: detail_date_value, widget: string }
          - { label: "Date Sub-text", name: detail_date_sub, widget: string }
          - { label: "Venue Name", name: detail_venue_value, widget: string }
          - { label: "Venue Sub-text", name: detail_venue_sub, widget: string }
          - { label: "Tickets Headline", name: detail_tickets_value, widget: string }
          - { label: "Tickets Detail", name: detail_tickets_sub, widget: text }
          - label: "Program Section"
            name: program_tag
            widget: string
            hint: "Tag line above the heading"
          - { label: "Program Title", name: program_title, widget: string }
          - { label: "Program Intro", name: program_intro, widget: text }
          - { label: "Program Sub-line", name: program_sub, widget: string }
          - { label: "Performances Tag", name: performances_tag, widget: string }
          - { label: "Performances Title", name: performances_title, widget: string }
          - { label: "Performances Body", name: performances_body, widget: text }
          - { label: "Food Tag", name: food_tag, widget: string }
          - { label: "Food Title", name: food_title, widget: string }
          - { label: "Food Body", name: food_body, widget: text }
          - { label: "What to Expect Tag", name: expect_tag, widget: string }
          - { label: "What is Juneteenth Tag", name: juneteenth_tag, widget: string }
          - { label: "What is Juneteenth — Paragraph 1", name: juneteenth_body_1, widget: text }
          - { label: "What is Juneteenth — Paragraph 2", name: juneteenth_body_2, widget: text }
          - { label: "Venue Section Tag", name: venue_tag, widget: string }
          - { label: "Venue Title", name: venue_title, widget: string }
          - { label: "Venue Body", name: venue_body, widget: text }
          - { label: "Venue Address", name: venue_address, widget: text }
          - { label: "Register CTA Title", name: register_title, widget: string }
          - { label: "Register CTA Sub-text", name: register_sub, widget: string }
          - { label: "Register Button Label", name: register_btn, widget: string }

  # ── WALKING TOUR — PRE-WAR TIMELINE ───────────────────────
  - name: countdown_page
    label: "Walking Tour: Pre-War Timeline"
    files:
      - name: countdown
        label: "Countdown to Civil War"
        file: _data/pages/countdown-to-civil-war.json
        fields:
          - { label: "Page Tag", name: tour_tag, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Intro Paragraph", name: intro, widget: text }
          - label: "1898 Entry"
            name: timeline_1898_title
            widget: string
            hint: "Event title for 1898"
          - { label: "1898 Body Text", name: timeline_1898_text, widget: text }
          - label: "1909 Entry"
            name: timeline_1909_title
            widget: string
          - { label: "1909 Body Text", name: timeline_1909_text, widget: text }
          - label: "1921 Entry"
            name: timeline_1921_title
            widget: string
          - { label: "1921 Body Text", name: timeline_1921_text, widget: text }
          - label: "1923 Entry"
            name: timeline_1923_title
            widget: string
          - { label: "1923 Body Text", name: timeline_1923_text, widget: text }
          - label: "1926 Entry"
            name: timeline_1926_title
            widget: string
          - { label: "1926 Body Text", name: timeline_1926_text, widget: text }
          - label: "1931 Entry"
            name: timeline_1931_title
            widget: string
          - { label: "1931 Body Text", name: timeline_1931_text, widget: text }
          - { label: "1931 Image URL", name: timeline_1931_image, widget: string, hint: "Full URL to the 1931 Second Republic image" }
          - { label: "1931 Image Alt Text", name: timeline_1931_image_alt, widget: string }
          - label: "1936 Entry"
            name: timeline_1936_title
            widget: string
          - { label: "1936 Body — Paragraph 1", name: timeline_1936_text_1, widget: text }
          - { label: "1936 Body — Paragraph 2", name: timeline_1936_text_2, widget: text }
          - { label: "1936 Body — Paragraph 3", name: timeline_1936_text_3, widget: string }

  # ── WALKING TOUR — EL RAVAL ───────────────────────────────
  - name: el_raval_page
    label: "Walking Tour: El Raval"
    files:
      - name: el_raval
        label: "El Raval Page Content"
        file: _data/pages/el-raval.json
        fields:
          - { label: "Page Tag", name: tour_tag, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Section Heading", name: section_evolution, widget: string }
          - { label: "Stop 10 Number Label", name: stop_10_num, widget: string }
          - { label: "Barri Xines Title", name: stop_barri_xines_title, widget: string }
          - { label: "Barri Xines / Mella — Para 1", name: intro_para_1, widget: text }
          - { label: "Barri Xines / Mella — Para 2", name: intro_para_2, widget: text }
          - { label: "Barri Xines / Mella — Para 3", name: intro_para_3, widget: text }
          - { label: "Barri Xines / Mella — Para 4", name: intro_para_4, widget: text }
          - { label: "Little Harlem Title", name: stop_little_harlem_title, widget: string }
          - { label: "Little Harlem — Para 1", name: little_harlem_para_1, widget: text }
          - { label: "Little Harlem — Para 2 (Kid Tunero quote)", name: little_harlem_para_2, widget: text }
          - { label: "Little Harlem — Para 3 (Barcelona Hot Club)", name: little_harlem_para_3, widget: text }
          - { label: "Little Harlem — Para 4 (Olympia & Eden)", name: little_harlem_para_4, widget: text }

  # ── WALKING TOUR — SPANISH SLAVE TRADE ───────────────────
  - name: slave_trade_page
    label: "Walking Tour: Spanish Slave Trade"
    files:
      - name: slave_trade
        label: "Slave Trade Page Content"
        file: _data/pages/spanish-slave-trade.json
        fields:
          - { label: "Page Tag", name: tour_tag, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Intro — Para 1 (Enslaved in Spain)", name: intro_para_1, widget: text }
          - { label: "Intro — Para 2 (Columbus)", name: intro_para_2, widget: text }
          - { label: "Intro — Para 3 (Slave trade)", name: intro_para_3, widget: text }
          - { label: "Intro — Para 4 (18th–19th c.)", name: intro_para_4, widget: text }
          - { label: "Intro — Para 5 (1817 treaty)", name: intro_para_5, widget: text }
          - { label: "Section Heading", name: section_stops, widget: string }
          - { label: "Stop 1 Title", name: stop_1_title, widget: string }
          - { label: "Stop 1 Address", name: stop_1_address, widget: string }
          - { label: "Stop 1 Text", name: stop_1_text, widget: text }
          - { label: "Stop 2 Title", name: stop_2_title, widget: string }
          - { label: "Stop 2 Address", name: stop_2_address, widget: string }
          - { label: "Stop 2 Text", name: stop_2_text, widget: text }
          - { label: "Stop 3 Title", name: stop_3_title, widget: string }
          - { label: "Stop 3 Text", name: stop_3_text, widget: text }
          - { label: "Stop 4 Title", name: stop_4_title, widget: string }
          - { label: "Stop 4 Address", name: stop_4_address, widget: string }
          - { label: "Stop 4 Text", name: stop_4_text, widget: text }
          - { label: "Stop 5 Title", name: stop_5_title, widget: string }
          - { label: "Stop 5 Text", name: stop_5_text, widget: text }
          - { label: "Stop 6 Title", name: stop_6_title, widget: string }
          - { label: "Stop 6 Address", name: stop_6_address, widget: string }
          - { label: "Stop 6 Text", name: stop_6_text, widget: text }

  # ── WALKING TOUR — SPANISH CIVIL WAR ─────────────────────
  - name: civil_war_page
    label: "Walking Tour: Spanish Civil War"
    files:
      - name: civil_war
        label: "Spanish Civil War Page Content"
        file: _data/pages/spanish-civil-war.json
        fields:
          - { label: "Page Tag", name: tour_tag, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Intro — Para 1", name: intro_para_1, widget: text }
          - { label: "Intro — Para 2 (Langston Hughes)", name: intro_para_2, widget: text }
          - { label: "Stop 7 Title", name: stop_7_title, widget: string }
          - { label: "Stop 7 Address", name: stop_7_address, widget: string }
          - { label: "Stop 7 Text", name: stop_7_text, widget: text }
          - { label: "Stop 8 Title", name: stop_8_title, widget: string }
          - { label: "Stop 8 Text 1", name: stop_8_text_1, widget: text }
          - { label: "Stop 8 Text 2", name: stop_8_text_2, widget: text }
          - { label: "Stop 9 Title", name: stop_9_title, widget: string }
          - { label: "Stop 9 Text", name: stop_9_text, widget: text }

  # ── WALKING TOUR — INDEX ──────────────────────────────────
  - name: tour_index_page
    label: "Walking Tour: Index"
    files:
      - name: tour_index
        label: "Tour Index Page Content"
        file: _data/pages/walking-tour-index.json
        fields:
          - { label: "Page Tag", name: tour_tag, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Duration", name: meta_duration, widget: string }
          - { label: "Difficulty", name: meta_difficulty, widget: string }
          - { label: "Start Point", name: meta_start, widget: string }
          - { label: "End Point", name: meta_end, widget: string }
          - { label: "Start Section Heading", name: section_start, widget: string }
          - { label: "Intro — Para 1", name: intro_para_1, widget: text }
          - { label: "Intro — Para 2 (Juneteenth)", name: intro_para_2, widget: text }
          - { label: "Intro — Para 3 (Self-guided)", name: intro_para_3, widget: text }
          - { label: "Intro — Para 4 (About)", name: intro_para_4, widget: text }
          - { label: "Langston Hughes — Para 1", name: langston_para_1, widget: text }
          - { label: "Langston Hughes — Para 2", name: langston_para_2, widget: text }
          - { label: "Langston Hughes — Para 3", name: langston_para_3, widget: text }
          - { label: "Langston Hughes — Para 4", name: langston_para_4, widget: text }
          - { label: "Langston Hughes — Para 5", name: langston_para_5, widget: text }

  # ── WALKING TOUR — POST-WAR INTELLECTUALS ─────────────────
  - name: post_war_page
    label: "Walking Tour: Post-War Intellectuals"
    files:
      - name: post_war
        label: "Post-War Intellectuals Page Content"
        file: _data/pages/post-war-intellectuals.json
        fields:
          - { label: "Page Tag", name: tour_tag, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Intro Paragraph 1", name: intro_para_1, widget: text }
          - { label: "Intro Paragraph 2", name: intro_para_2, widget: text }
          - label: "Stop 11 — MACBA"
            name: stop_11_title
            widget: string
          - { label: "Stop 11 Address", name: stop_11_address, widget: string }
          - { label: "Stop 11 Image URL", name: stop_11_image, widget: string }
          - { label: "Stop 11 Image Alt", name: stop_11_image_alt, widget: string }
          - { label: "Stop 11 Text", name: stop_11_text, widget: text }
          - label: "Stop 12 — CCCB"
            name: stop_12_title
            widget: string
          - { label: "Stop 12 Address", name: stop_12_address, widget: string }
          - { label: "Stop 12 Image URL", name: stop_12_image, widget: string }
          - { label: "Stop 12 Image Alt", name: stop_12_image_alt, widget: string }
          - { label: "Stop 12 Text", name: stop_12_text, widget: markdown }
          - label: "Stop 13 — Richard Wright"
            name: stop_13_title
            widget: string
          - { label: "Stop 13 Address", name: stop_13_address, widget: string }
          - { label: "Stop 13 Image URL", name: stop_13_image, widget: string }
          - { label: "Stop 13 Image Alt", name: stop_13_image_alt, widget: string }
          - label: "Stop 14 — James Baldwin"
            name: stop_14_title
            widget: string
          - { label: "Stop 14 Address", name: stop_14_address, widget: string }
          - { label: "Stop 14 Image URL", name: stop_14_image, widget: string }
          - { label: "Stop 14 Image Alt", name: stop_14_image_alt, widget: string }
          - { label: "End Stop Title", name: stop_end_title, widget: string }
          - { label: "End Stop Address", name: stop_end_address, widget: string }

  # ── SITE SETTINGS ─────────────────────────────────────────
  - name: settings
    label: "Site Settings"
    files:
      - name: general
        label: "General Settings"
        file: _data/settings.json
        fields:
          - { label: "Site Tagline", name: tagline, widget: string }
          - { label: "Hero Description", name: hero_description, widget: text }
          - { label: "Contact Email", name: email, widget: string }
          - { label: "Instagram URL", name: instagram, widget: string, required: false }
          - { label: "Facebook URL", name: facebook, widget: string, required: false }
          - { label: "Show Gallery in Nav", name: show_gallery_nav, widget: boolean, default: false }
