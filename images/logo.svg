<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 440" role="img" aria-label="Juneteenth Barcelona">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&amp;display=swap');
      .logo-letter { font-family: 'Montserrat', 'Arial Black', Impact, sans-serif; font-weight: 900; font-size: 158px; dominant-baseline: auto; }
      .logo-sub { font-family: 'Montserrat', 'Arial Black', sans-serif; font-weight: 700; font-size: 42px; letter-spacing: 22px; dominant-baseline: auto; }
    </style>
  </defs>

  <!-- JUNE row -->
  <text class="logo-letter" x="0"   y="158" fill="#C8102E">J</text>
  <text class="logo-letter" x="90"  y="158" fill="#E8A020">U</text>
  <text class="logo-letter" x="200" y="158" fill="#0D0D0D">N</text>
  <text class="logo-letter" x="308" y="158" fill="#0D0D0D">E</text>

  <!-- Green bars (right of JUNE — three horizontal stripes) -->
  <rect x="420" y="20"  width="155" height="32" rx="2" fill="#00693A"/>
  <rect x="420" y="70"  width="155" height="32" rx="2" fill="#00693A"/>
  <rect x="420" y="120" width="155" height="32" rx="2" fill="#00693A"/>

  <!-- TEENTH row -->
  <text class="logo-letter" x="0"   y="316" fill="#0D0D0D">T</text>
  <text class="logo-letter" x="90"  y="316" fill="#C8102E">E</text>
  <text class="logo-letter" x="182" y="316" fill="#E8A020">E</text>
  <text class="logo-letter" x="274" y="316" fill="#0D0D0D">N</text>
  <text class="logo-letter" x="382" y="316" fill="#0D0D0D">T</text>
  <text class="logo-letter" x="472" y="316" fill="#00693A">H</text>

  <!-- BARCELONA -->
  <text class="logo-sub" x="20" y="400" fill="#3D3D3D">BARCELONA</text>
</svg>
