<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎟 Juneteenth Venue OS — Mobile Boardroom</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:linear-gradient(180deg,#0b0f19,#070a12);
color:#e5e7eb;
}

.container{
max-width:1100px;
margin:auto;
padding:14px;
}

/* HEAD */
h1{font-size:22px;margin-bottom:6px}
.sub{color:#94a3b8;font-size:12px;margin-bottom:14px}

/* CARDS */
.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
padding:14px;
margin-top:12px;
}

/* MOBILE GRID FIX */
.grid{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

@media(min-width:768px){
.grid{grid-template-columns:1fr 1fr;}
}

input[type=range]{
width:100%;
margin:10px 0 18px;
accent-color:#60a5fa;
}

/* METRICS */
.metric{
display:flex;
justify-content:space-between;
font-size:13px;
margin:6px 0;
}

/* COLORS */
.green{color:#4ade80}
.red{color:#f87171}

/* VENUE CARDS */
.venueGrid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

@media(min-width:768px){
.venueGrid{grid-template-columns:1fr 1fr;}
}

.venueCard{
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
background:rgba(255,255,255,0.03);
}

.venueImg{
width:100%;
height:200px;
object-fit:cover;
}

.venueBody{padding:12px}

.venueTitle{font-weight:700;font-size:15px}

.venueMeta{font-size:12px;color:#94a3b8;margin-top:4px}

.tag{
display:inline-block;
margin-top:6px;
font-size:11px;
padding:4px 8px;
border-radius:999px;
background:#111827;
color:#cbd5e1;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:999;
padding:10px;
}

.modal img{
width:100%;
max-width:900px;
max-height:85vh;
object-fit:contain;
border-radius:10px;
}

.modalControls{
position:absolute;
bottom:20px;
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:10px 12px;
border-radius:10px;
background:#111827;
border:1px solid rgba(255,255,255,0.1);
color:white;
font-size:12px;
}

/* BIG KPI MOBILE FRIENDLY */
.kpi{
font-size:18px;
font-weight:800;
margin-top:6px;
}

.small{font-size:12px;color:#94a3b8}

</style>
</head>

<body>

<div class="container">

<h1>🎟 Juneteenth Venue OS</h1>
<div class="sub">Mobile-first break-even + sponsorship + ticket + bar revenue model</div>

<!-- CONTROLS -->
<div class="card">
<h3>🎛 Inputs</h3>

<label>Oversell 📈</label>
<input type="range" id="oversell" min="1" max="1.6" step="0.05"/>

<label>Ticket Price 🎟</label>
<input type="range" id="ticket" min="8" max="25" step="1"/>

<label>Confidence 🔮</label>
<input type="range" id="confidence" min="0.5" max="0.95" step="0.05"/>
</div>

<!-- GAP -->
<div class="card">
<h3>💥 Break-even Status</h3>
<div id="gap"></div>
</div>

<!-- VENUES -->
<div class="card">
<h3>🖼 Venues</h3>

<div class="venueGrid">

<!-- CARRETES -->
<div class="venueCard" onclick="openGallery('carretes',0)">
<img class="venueImg" src="/images/carreres47/IMG_7272.jpeg"/>
<div class="venueBody">
<div class="venueTitle">🟡 Carretes 47</div>
<div class="venueMeta">El Raval • 150 cap • 13–21h</div>
<div class="tag">Lower cost / higher ops load</div>
</div>
</div>

<!-- ROOTS -->
<div class="venueCard" onclick="openGallery('roots',0)">
<img class="venueImg" src="/images/roots/IMG_7237.jpeg"/>
<div class="venueBody">
<div class="venueTitle">🟢 Roots Gastro Club</div>
<div class="venueMeta">Poblenou • 200 cap • 13–02h</div>
<div class="tag">Bar revenue + premium + black-owned</div>
</div>
</div>

</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<img id="modalImg"/>

<div class="modalControls">
<button class="btn" onclick="prevImg(event)">← Prev</button>
<button class="btn" onclick="nextImg(event)">Next →</button>
<button class="btn" onclick="closeModal()">Close ✕</button>
</div>
</div>

<script>

const BASE_SPONSOR = 300;

const venues={
carretes:{capacity:150,cost:2940,bar:false},
roots:{capacity:200,cost:2960,bar:true}
};

let state={oversell:1.3,ticket:12,confidence:0.8};

/* IMAGES */
const images={
carretes:Array.from({length:9},(_,i)=>`/images/carreres47/IMG_${7272+i}.jpeg`),
roots:Array.from({length:30},(_,i)=>`/images/roots/IMG_${7237+i}.jpeg`)
};

let currentVenue="carretes";
let currentIndex=0;

/* MODEL */
function demand(v){
return v.capacity * state.oversell * state.confidence;
}

function barRevenue(v){
if(!v.bar) return 0;
const d=demand(v);
return d * 25 * 0.10;
}

function revenue(v){
return demand(v)*state.ticket + barRevenue(v);
}

function gap(v){
return (v.cost - BASE_SPONSOR) - revenue(v);
}

/* RENDER */
function renderGap(){

const carretesGap = gap(venues.carretes);
const rootsGap = gap(venues.roots);

document.getElementById("gap").innerHTML=`
<div class="grid">

<div>
<div>🟡 Carretes</div>
<div class="kpi ${carretesGap<=0?'green':'red'}">€${Math.round(carretesGap)}</div>
</div>

<div>
<div>🟢 Roots</div>
<div class="kpi ${rootsGap<=0?'green':'red'}">€${Math.round(rootsGap)}</div>
</div>

</div>
`;
}

/* GALLERY */
function openGallery(v,i){
currentVenue=v;
currentIndex=i;
document.getElementById("modalImg").src=images[v][i];
document.getElementById("modal").style.display="flex";
event.stopPropagation();
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function nextImg(e){
e.stopPropagation();
currentIndex=(currentIndex+1)%images[currentVenue].length;
document.getElementById("modalImg").src=images[currentVenue][currentIndex];
}

function prevImg(e){
e.stopPropagation();
currentIndex=(currentIndex-1+images[currentVenue].length)%images[currentVenue].length;
document.getElementById("modalImg").src=images[currentVenue][currentIndex];
}

/* INPUTS */
document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",e=>{
state[e.target.id]=parseFloat(e.target.value);
renderGap();
});
});

renderGap();

</script>

</body>
</html>
