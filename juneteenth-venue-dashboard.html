<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Juneteenth Barcelona 2026 – Venue Decision</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0f19;
    --card:#111827;
    --line:rgba(255,255,255,.08);
    --text:#e5e7eb;
    --muted:#94a3b8;
    --green:#22c55e;
    --red:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter,system-ui;
    background:radial-gradient(circle at top,#111827,#0b0f19);
    color:var(--text);
}

/* HERO */
.hero{
    padding:3.5rem 1.5rem 1.5rem;
    text-align:center;
}

.hero h1{
    font-size:2.3rem;
    font-weight:800;
}

.hero p{
    color:var(--muted);
    margin-top:.5rem;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:0 auto;
    padding:1.5rem;
}

/* WINNER */
.winner{
    border:1px solid var(--line);
    background:rgba(34,197,94,.08);
    border-radius:16px;
    padding:1.2rem;
    margin-bottom:1.5rem;
}

.winner h2{
    font-size:1.1rem;
}

.badge{
    display:inline-block;
    margin-top:.5rem;
    font-size:.75rem;
    color:#86efac;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1.5rem;
}

@media(max-width:900px){
    .grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
    border:1px solid var(--line);
    background:rgba(255,255,255,.03);
    border-radius:18px;
    overflow:hidden;
}

.header{
    padding:1.25rem;
    font-weight:800;
    font-size:1.2rem;
}

.meta{
    color:var(--muted);
    font-size:.85rem;
    margin-top:.3rem;
}

/* CAROUSEL */
.carousel{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    gap:6px;
    padding:6px;
}

.carousel img{
    width:100%;
    max-width:320px;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    scroll-snap-align:center;
    flex:0 0 auto;
}

/* METRICS */
.metrics{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
}

.metric{
    text-align:center;
    padding:1rem;
}

.metric b{
    display:block;
    font-size:1.1rem;
}

.metric span{
    font-size:.75rem;
    color:var(--muted);
}

/* INSIGHT */
.body{
    padding:1rem 1.25rem;
}

.insight{
    font-size:.9rem;
    color:var(--muted);
    line-height:1.5;
}

/* BUTTON */
button{
    margin-top:.75rem;
    background:none;
    border:1px solid var(--line);
    color:var(--text);
    padding:.4rem .7rem;
    border-radius:10px;
    cursor:pointer;
    font-size:.8rem;
}

button:hover{
    border-color:#fff;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Venue Decision</h1>
    <p>Juneteenth Barcelona 2026 — Final comparison</p>
</div>

<div class="container">

<div class="winner" id="winner"></div>

<div class="grid" id="app"></div>

</div>

<script>
const venues = [
{
name:"Carretes 47",
color:"#ef4444",
folder:"/images/carreres47/IMG_",
range:[7272,7280],
cost:2940,
cap:150,
area:340,
score:8.1,
insight:"Stronger aesthetic + lower production cost, but requires external sound + security + earlier cutoff."
},
{
name:"Roots Gastro Club",
color:"#22c55e",
folder:"/images/roots/IMG_",
range:[7237,7266],
cost:2960,
cap:200,
area:650,
score:9.1,
insight:"Best operationally: kitchen, sound, lighting + late license included. Higher base cost but lower friction."
}
];

function images(v){
let html="";
for(let i=v.range[0]; i<=v.range[1]; i++){
html+=`<img src="${v.folder}${i}.jpeg" />`;
}
return html;
}

function render(){
const winner = venues.reduce((a,b)=>a.score>b.score?a:b);

document.getElementById("winner").innerHTML=`
<h2>🏆 Recommended: ${winner.name}</h2>
<div class="badge">Highest overall execution score (${winner.score})</div>
<div style="margin-top:.5rem;color:var(--muted);font-size:.9rem">${winner.insight}</div>
`;

document.getElementById("app").innerHTML=venues.map(v=>`
<div class="card">

<div class="header" style="color:${v.color}">
${v.name}
<div class="meta">Score: ${v.score} · €${v.cost} · ${v.cap} guests · ${v.area}m²</div>
</div>

<div class="carousel">
${images(v)}
</div>

<div class="metrics">
<div class="metric"><b>€${v.cost}</b><span>Cost</span></div>
<div class="metric"><b>${v.cap}</b><span>Capacity</span></div>
<div class="metric"><b>${v.area}</b><span>Area</span></div>
</div>

<div class="body">
<div class="insight">${v.insight}</div>
<button onclick="alert('Score = execution readiness + infrastructure + guest experience')">
Why this score?
</button>
</div>

</div>
`).join("");
}

render();
</script>

</body>
</html>
