<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Juneteenth Barcelona 2026 – Venue OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0f19;
    --line:rgba(255,255,255,.08);
    --text:#e5e7eb;
    --muted:#94a3b8;
    --green:#22c55e;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter;
    background:radial-gradient(circle at top,#111827,#0b0f19);
    color:var(--text);
}

/* HEADER */
.header{
    text-align:center;
    padding:2.5rem 1rem 1rem;
}

.header h1{font-size:2.2rem;font-weight:800;}
.header p{color:var(--muted);margin-top:.5rem;}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:.5rem;
    margin:1rem 0;
}

.tab{
    padding:.45rem .8rem;
    border:1px solid var(--line);
    border-radius:999px;
    cursor:pointer;
    font-size:.85rem;
}

.tab.active{
    border-color:white;
}

/* LAYOUT */
.container{
    max-width:1100px;
    margin:0 auto;
    padding:1rem;
}

/* CONFIG PANEL */
.config{
    border:1px solid var(--line);
    border-radius:14px;
    padding:1rem;
    margin-bottom:1rem;
}

.slider{
    width:100%;
}

/* WINNER */
.winner{
    padding:1rem;
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:1rem;
    background:rgba(34,197,94,.08);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1rem;
}

@media(max-width:900px){
    .grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
}

.header-card{
    padding:1rem;
    font-weight:800;
}

/* CAROUSEL */
.carousel{
    display:flex;
    overflow-x:auto;
    gap:6px;
    padding:6px;
}

.carousel img{
    width:240px;
    height:140px;
    object-fit:cover;
    border-radius:10px;
}

/* METRICS */
.metrics{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    border-top:1px solid var(--line);
}

.metric{
    text-align:center;
    padding:.75rem;
}

/* EXPLAINER */
.explainer{
    border:1px solid var(--line);
    border-radius:14px;
    padding:1rem;
    margin-top:1rem;
    color:var(--muted);
    line-height:1.5;
}

/* PITCH */
.pitch{
    border:1px solid var(--line);
    border-radius:14px;
    padding:1rem;
    background:rgba(255,255,255,.03);
}

.pitch h3{
    margin-bottom:.5rem;
}
</style>
</head>

<body>

<div class="header">
<h1>Venue Decision OS</h1>
<p>Juneteenth Barcelona 2026</p>
</div>

<div class="tabs">
<div class="tab active" onclick="setTab('decision')">Decision</div>
<div class="tab" onclick="setTab('media')">Media</div>
<div class="tab" onclick="setTab('stakeholders')">Stakeholders</div>
<div class="tab" onclick="setTab('pitch')">Sponsor Pitch</div>
</div>

<div class="container">

<div id="config"></div>
<div id="winner"></div>
<div id="app"></div>

</div>

<script>

let tab="decision";

let weights={
cost:0.4,
exp:0.3,
ops:0.2,
night:0.1
};

const venues=[
{
name:"Carretes 47",
color:"#ef4444",
folder:"/images/carreres47/IMG_",
range:[7272,7280],
base:8.1,
cost:2940,
cap:150
},
{
name:"Roots Gastro Club",
color:"#22c55e",
folder:"/images/roots/IMG_",
range:[7237,7266],
base:9.1,
cost:2960,
cap:200
}
];

function score(v){
return (
(v.base*0.4*weights.exp) +
((10-(v.cost/500))*weights.cost) +
(v.cap/200*10*weights.ops) +
(v.base*weights.night)
).toFixed(2);
}

function winner(){
return venues.reduce((a,b)=>score(a)>score(b)?a:b);
}

function images(v){
let h="";
for(let i=v.range[0];i<=v.range[1];i++){
h+=`<img src="${v.folder}${i}.jpeg"/>`;
}
return h;
}

/* AI EXPLAINER (RULE-BASED) */
function explain(w){
if(w.name.includes("Roots")){
return "Roots wins due to operational completeness: integrated kitchen, sound, lighting, and extended license reduce production friction and risk. This makes it structurally more reliable for large-scale programming and late-night flow.";
}else{
return "Carretes wins on cost efficiency and spatial flexibility, but requires additional production infrastructure (sound, security, kitchen logistics), increasing execution complexity.";
}
}

function renderConfig(){
return `
<div class="config">
<b>Live Weight Controls</b><br/><br/>

Cost <input class="slider" type="range" min="0" max="1" step="0.1" value="${weights.cost}" onchange="updateWeight('cost',this.value)"/><br/>
Experience <input class="slider" type="range" min="0" max="1" step="0.1" value="${weights.exp}" onchange="updateWeight('exp',this.value)"/><br/>
Operations <input class="slider" type="range" min="0" max="1" step="0.1" value="${weights.ops}" onchange="updateWeight('ops',this.value)"/><br/>
Night Flow <input class="slider" type="range" min="0" max="1" step="0.1" value="${weights.night}" onchange="updateWeight('night',this.value)"/>
</div>
`;
}

function render(){
const w=winner();

document.getElementById("config").innerHTML=renderConfig();

document.getElementById("winner").innerHTML=`
<div class="winner">
🏆 <b>Recommended: ${w.name}</b><br/>
<span style="color:var(--muted)">Score ${score(w)}</span>

<div class="explainer">
<b>Decision Insight</b><br/>
${explain(w)}
</div>
</div>
`;

if(tab==="decision"){
document.getElementById("app").innerHTML=`
<div class="grid">
${venues.map(v=>`
<div class="card">

<div class="header-card" style="color:${v.color}">
${v.name}
</div>

<div class="metrics">
<div class="metric">€${v.cost}<br/><small>Cost</small></div>
<div class="metric">${v.cap}<br/><small>Cap</small></div>
<div class="metric">${score(v)}<br/><small>Score</small></div>
</div>

</div>
`).join("")}
</div>
`;
}

if(tab==="media"){
document.getElementById("app").innerHTML=`
<div class="grid">
${venues.map(v=>`
<div class="card">
<div class="header-card">${v.name}</div>
<div class="carousel">${images(v)}</div>
</div>
`).join("")}
</div>
`;
}

if(tab==="pitch"){
document.getElementById("app").innerHTML=`
<div class="pitch">
<h3>Juneteenth Barcelona 2026</h3>
<p>
A culturally significant large-scale experience combining music, art, food, and community.
</p>

<br/>

<b>Audience:</b> 150–200 guests<br/>
<b>Format:</b> Day → Night cultural progression<br/>
<b>Programming:</b> Live music, DJ sets, food vendors, art market<br/>

<br/>

<b>Why it matters:</b>
This event positions Barcelona as a global cultural node for diasporic creative expression, combining immersive hospitality and nightlife programming.
</div>
`;
}

}

function updateWeight(k,v){
weights[k]=parseFloat(v);
render();
}

function setTab(t){
tab=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");
render();
}

render();

</script>

</body>
</html>
