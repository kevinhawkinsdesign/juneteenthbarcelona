<script type="text/babel">
    const { useState } = React;
    
    function VenueDashboard() {
        const [expandedVenue, setExpandedVenue] = useState(null);
        const [viewMode, setViewMode] = useState('costs');
        
        const venues = {
            carretes47: {
                name: 'Carretes 47',
                location: 'Poblenou, Barcelona (Old Town)',
                owned: 'Community-oriented',
                color: '#C8102E',
                baseRental: 1200,
                baseCapacity: 150,
                totalArea: 380,
                standingArea: 200,
                diningArea: 80,
                artMarketArea: 80,
                stagingArea: 30,
                rentalHours: '10:00 AM – 10:00 PM (12 hours)',
                hourlyRate: '€100/hour',
                costs: {
                    'Venue Rental (€100/hr × 12 hrs)': 1200,
                    'Kitchen Access (+20%)': 240,
                    'Security (2 guards, 12hrs)': 800,
                    'Cleaning & Breakdown': 300,
                    'Sound System Rental': 400,
                    'Furniture Rental (3 couches, 6 chairs, tables)': 300
                },
                equipment: ['Sound system rental', 'Wi-Fi', 'Lighting', 'A/C', 'Kitchen access'],
                strengths: ['Historic character & brand story', 'Lower hourly rate (€100/hr)', 'External food vendors allowed', 'Flexible BYO alcohol'],
                warnings: ['Coliving residents (noise curfew)', 'Flex space renovation timing', 'Multi-vendor coordination', 'Must close by 10 PM']
            },
            roots: {
                name: 'Roots Gastro Club',
                location: 'Poblenou, Barcelona',
                owned: 'Black-owned Business',
                color: '#00693A',
                baseRental: 2660,
                baseCapacity: 200,
                totalArea: 650,
                standingArea: 250,
                diningArea: 120,
                artMarketArea: 60,
                stagingArea: 80,
                rentalHours: '10:00 AM – 2:00 AM (14 hours)',
                hourlyRate: '€190/hour',
                costs: {
                    'Venue Rental (€190/hr × 14 hrs)': 2660,
                    'Kitchen Access': 0,
                    'Security (2 guards, included)': 0,
                    'Cleaning & Breakdown': 300,
                    'Sound System (included)': 0,
                    'Furniture Rental': 0
                },
                equipment: ['Professional sound system (included)', 'Stage', 'Professional lighting (included)', 'Security staff (included)', 'Bar operations', 'Central kitchen (60m² vendor support)', 'Catering service available'],
                strengths: ['Black-owned partnership', 'Professional turn-key infrastructure', '3-zone configuration', 'Sound & security INCLUDED', 'Open until 2 AM for extended celebration', 'No policy ambiguity'],
                warnings: ['Higher hourly rate (€190/hr)', 'Catering may limit external vendors', 'Extended hours add cost but allow late-night celebration']
            }
        };
        
        const calculateTotal = (venue) => Object.values(venue.costs).reduce((a, b) => a + b, 0);
        
        const VenueCard = ({ venueKey }) => {
            const venue = venues[venueKey];
            const isExpanded = expandedVenue === venueKey;
            const total = calculateTotal(venue);
            const otherVenue = venueKey === 'carretes47' ? venues.roots : venues.carretes47;
            const otherTotal = calculateTotal(otherVenue);
            const difference = Math.abs(total - otherTotal);
            const isCheaper = total < otherTotal;
            
            const colors = ['#C8102E', '#FF6B35', '#004E89', '#7209B7', '#FF006E', '#3A86FF'];
            
            const CostBreakdown = () => {
                const costs = Object.entries(venue.costs).filter(([_, value]) => value > 0);
                const maxValue = Math.max(...costs.map(([_, v]) => v));
                
                return (
                    <div>
                        {costs.map(([label, value], idx) => (
                            <div key={label} className="cost-item">
                                <div className="cost-label">
                                    <span>{label}</span>
                                    <span style={{ color: colors[idx] }}>€{value}</span>
                                </div>
                                <div className="cost-bar">
                                    <div 
                                        className="cost-bar-fill" 
                                        style={{ 
                                            width: `${(value / maxValue) * 100}%`,
                                            backgroundColor: colors[idx]
                                        }}
                                    />
                                </div>
                            </div>
                        ))}
                        <div className="cost-total">
                            <span className="cost-total-label">TOTAL EVENT COST</span>
                            <span className="cost-total-value" style={{ color: venue.color }}>€{total}</span>
                        </div>
                    </div>
                );
            };
            
            const SpaceBreakdown = () => {
                const areas = [
                    { name: 'Live Performance Stage', size: venue.stagingArea, color: '#FFB703' },
                    { name: 'Dance Floor (100 guests)', size: venue.standingArea, color: '#FB5607' },
                    { name: venueKey === 'carretes47' ? 'Art Market & Vendor Booth Prep' : 'Art Market + Central Kitchen (20 vendors)', size: venue.artMarketArea, color: '#8338EC' },
                    { name: 'Dining & Seating', size: venue.diningArea, color: '#3A86FF' }
                ];
                
                return (
                    <div>
                        <div className="space-grid">
                            <div className="space-stat">
                                <div className="space-stat-label">Total Floor Space</div>
                                <div className="space-stat-value">{venue.totalArea}m²</div>
                            </div>
                            <div className="space-stat">
                                <div className="space-stat-label">Standing Capacity</div>
                                <div className="space-stat-value">{venue.baseCapacity}</div>
                            </div>
                        </div>
                        
                        {areas.map((area) => {
                            const pct = (area.size / venue.totalArea * 100).toFixed(0);
                            return (
                                <div key={area.name} className="space-area">
                                    <div className="space-area-header">
                                        <span>{area.name}</span>
                                        <div className="space-area-value">
                                            <div className="space-area-size">{area.size}m²</div>
                                            <div className="space-area-pct">{pct}% of total</div>
                                        </div>
                                    </div>
                                    <div className="space-bar">
                                        <div 
                                            className="space-bar-fill"
                                            style={{ 
                                                width: `${pct}%`,
                                                backgroundColor: area.color
                                            }}
                                        />
                                    </div>
                                </div>
                            );
                        })}
                        
                        <div className="adequacy-box">
                            <div className="adequacy-title">✓ Space Adequacy for Event Requirements</div>
                            <ul className="adequacy-list">
                                <li>✓ Performance stage: {venue.stagingArea}m² {venue.stagingArea >= 30 ? '(adequate)' : '(tight)'}</li>
                                <li>✓ 100 dancers @ 1.5–2m² per person: {venue.standingArea}m² {venue.standingArea >= 150 ? '(comfortable)' : '(adequate)'}</li>
                                <li>✓ Art market 20 vendors @ 2m²/booth: {venue.artMarketArea}m² {venue.artMarketArea >= 40 ? '(ideal)' : '(tight)'}</li>
                                <li>✓ Dining & socializing: {venue.diningArea}m² {venue.diningArea >= 80 ? '(generous)' : '(moderate)'}</li>
                            </ul>
                        </div>
                    </div>
                );
            };
            
            const FeaturesBreakdown = () => (
                <div>
                    <div style={{ marginBottom: '2rem' }}>
                        <h4 style={{ fontWeight: '900', marginBottom: '1rem' }}>Included Equipment & Services</h4>
                        <div className="equipment-grid">
                            {venue.equipment.map((item, idx) => (
                                <div key={idx} className="equipment-item">
                                    <div className="equipment-check">✓</div>
                                    <span>{item}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div style={{ marginBottom: '2rem' }}>
                        <h4 style={{ fontWeight: '900', marginBottom: '1rem' }}>Key Strengths</h4>
                        <div>
                            {venue.strengths.map((strength, idx) => (
                                <div key={idx} className="strength-item">
                                    <span className="strength-arrow">→</span>
                                    <span>{strength}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {venue.warnings.length > 0 && (
                        <div>
                            <h4 style={{ fontWeight: '900', marginBottom: '1rem' }}>Considerations</h4>
                            {venue.warnings.map((warning, idx) => (
                                <div key={idx} className="warning-item">
                                    <div className="warning-icon">⚠</div>
                                    <span>{warning}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
            
            return (
                <div className={`venue-card ${isExpanded ? 'expanded' : ''}`}>
                    <div className="venue-header" style={{ backgroundColor: venue.color }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                            <div>
                                <h3>{venue.name}</h3>
                                <div className="venue-header-info">
                                    📍 {venue.location}
                                </div>
                                <div className="venue-header-info">
                                    🕐 {venue.rentalHours}
                                </div>
                                {venue.owned && (
                                    <div className="venue-header-badge">⭐ {venue.owned}</div>
                                )}
                            </div>
                            <div style={{ fontSize: '1.5rem', cursor: 'pointer', transition: 'transform 0.3s' }}>
                                {isExpanded ? '▼' : '▶'}
                            </div>
                        </div>
                    </div>
                    
                    <div className="venue-stats">
                        <div className="stat">
                            <div className="stat-label">Total Cost</div>
                            <div className="stat-value" style={{ color: venue.color }}>€{total}</div>
                            <div className="stat-subtext">{venue.hourlyRate}</div>
                        </div>
                        <div className="stat">
                            <div className="stat-label">Capacity</div>
                            <div className="stat-value">{venue.baseCapacity}</div>
                        </div>
                        <div className="stat">
                            <div className="stat-label">Total Area</div>
                            <div className="stat-value">{venue.totalArea}m²</div>
                        </div>
                    </div>
                    
                    {isCheaper && (
                        <div style={{ background: '#dcfce7', borderTop: '2px solid #e5e7eb', padding: '1rem 2rem' }}>
                            <div style={{ color: '#166534', fontWeight: 'bold' }}>
                                💰 Save €{difference} vs. {otherVenue.name}
                            </div>
                        </div>
                    )}
                    
                    {isExpanded && (
                        <div className="venue-content">
                            <div className="venue-tabs">
                                {['costs', 'space', 'features'].map(tab => (
                                    <button
                                        key={tab}
                                        className={`venue-tab ${viewMode === tab ? 'active' : ''}`}
                                        onClick={() => setViewMode(tab)}
