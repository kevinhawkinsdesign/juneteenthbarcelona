<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎟 Juneteenth Venue Decision OS — Autopilot</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:linear-gradient(180deg,#0b0f19,#070a12);
color:#e5e7eb;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{font-size:24px;margin-bottom:6px}
.sub{color:#94a3b8;font-size:13px;margin-bottom:16px}

.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:16px;
margin-top:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

input[type=range]{
width:100%;
margin:8px 0 14px;
accent-color:#60a5fa;
}

.metric{
display:flex;
justify-content:space-between;
font-size:13px;
margin:6px 0;
}

.small{font-size:12px;color:#94a3b8}

.green{color:#4ade80}
.red{color:#f87171}
.blue{color:#60a5fa}
.yellow{color:#fbbf24}

.badge{
display:inline-block;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.curve-line{
display:flex;
justify-content:space-between;
font-size:12px;
padding:3px 0;
border-bottom:1px solid rgba(255,255,255,0.04);
}

.autopilot{
padding:12px;
border-radius:12px;
background:rgba(59,130,246,0.08);
border:1px solid rgba(59,130,246,0.2);
margin-top:10px;
}

hr{
border:0;
border-top:1px solid rgba(255,255,255,0.08);
margin:12px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🎟 Juneteenth Venue Decision OS</h1>
<div class="sub">
🤖 Autopilot decision engine • 📊 €300 sponsorship included • 📉 risk + certainty modeling
</div>

<!-- CONTROLS -->
<div class="card">
<h3>🎛 Live Controls</h3>

<label>Oversell 📈</label>
<input type="range" id="oversell" min="1" max="1.6" step="0.05"/>

<label>Ticket Price 🎟</label>
<input type="range" id="ticket" min="8" max="25" step="1"/>

<label>Demand Confidence 🔮</label>
<input type="range" id="confidence" min="0.5" max="0.95" step="0.05"/>

<div class="small">Includes €300 sponsorship offset applied to both venues</div>
</div>

<!-- AUTOPILOT -->
<div class="card">
<h3>🤖 Autopilot Recommendation</h3>
<div id="autopilot"></div>
</div>

<!-- FINANCE -->
<div class="card">
<h3>💰 Financial Snapshot</h3>
<div id="finance"></div>
</div>

<!-- CURVES -->
<div class="card">
<h3>📉 Break-even Curves</h3>
<div class="grid">
<div id="curveA"></div>
<div id="curveB"></div>
</div>
</div>

<!-- TABLE -->
<div class="card">
<h3>⚖️ Structural Comparison</h3>
<table id="table"></table>
</div>

</div>

<script>

const SPONSOR = 300;

const venues = [
{
name:"🟡 Carretes 47",
capacity:150,
cost:2940,
bar:false,
hours:"13–21h",
complexity:7,
monetization:6,
location:"El Raval"
},
{
name:"🟢 Roots",
capacity:200,
cost:2960,
bar:true,
hours:"13–02h",
complexity:4,
monetization:9,
location:"Poblenou"
}
];

let state={
oversell:1.3,
ticket:12,
confidence:0.8
};

/* REVENUE */
function revenue(v,conf){
const demand = v.capacity * state.oversell * conf;
const ticket = demand * state.ticket;
const bar = v.bar ? demand * 25 * 0.10 : 0;
return ticket + bar;
}

/* PROFIT */
function profit(v,conf){
return revenue(v,conf) - (v.cost - SPONSOR);
}

/* CURVE */
function curve(v){

let html="";
let breakEven=null;

for(let c=0.5;c<=1.0;c+=0.05){

const p = profit(v,c);

if(!breakEven && p>=0) breakEven=c;

html+=`
<div class="curve-line">
<span>🔮 ${Math.round(c*100)}%</span>
<span class="${p>=0?'green':'red'}">€${Math.round(p)}</span>
</div>
`;
}

return {html,breakEven};
}

/* AUTOPILOT */
function autopilot(){

const c = curve(venues[0]);
const r = curve(venues[1]);

const pC = profit(venues[0],state.confidence);
const pR = profit(venues[1],state.confidence);

const best = pC > pR ? venues[0] : venues[1];

const other = pC > pR ? venues[1] : venues[0];

document.getElementById("autopilot").innerHTML=`

<div class="autopilot">
<span class="badge ${best===venues[1]?'green':'yellow'}">
🏆 Recommended: ${best.name}
</span>

<hr/>

<div class="small">
✔ Higher expected profit at current confidence<br/>
✔ Better risk-adjusted return profile<br/>
✔ Stronger scalability under demand variability
</div>

<hr/>

<div class="metric"><span>Expected Profit (Best)</span><b>€${Math.round(Math.max(pC,pR))}</b></div>
<div class="metric"><span>Alternative Profit</span><b>€${Math.round(Math.min(pC,pR))}</b></div>
</div>
`;
}

/* FINANCE */
function finance(){

const c = profit(venues[0],state.confidence);
const r = profit(venues[1],state.confidence);

document.getElementById("finance").innerHTML=`

<div class="grid">

<div>
<div class="metric"><span>${venues[0].name}</span><b>€${Math.round(c)}</b></div>
</div>

<div>
<div class="metric"><span>${venues[1].name}</span><b>€${Math.round(r)}</b></div>
</div>

</div>

<div class="small">💡 Profit includes €300 sponsorship baseline offset</div>
`;
}

/* CURVES */
function renderCurves(){

const c = curve(venues[0]);
const r = curve(venues[1]);

document.getElementById("curveA").innerHTML=
`<h4>🟡 Carretes</h4>` + c.html;

document.getElementById("curveB").innerHTML=
`<h4>🟢 Roots</h4>` + r.html;
}

/* TABLE */
function table(){

document.getElementById("table").innerHTML=`

<tr><th>Metric</th><th>${venues[0].name}</th><th>${venues[1].name}</th></tr>

<tr><td>📍 Location</td><td>${venues[0].location}</td><td>${venues[1].location}</td></tr>
<tr><td>🕐 Hours</td><td>${venues[0].hours}</td><td>${venues[1].hours}</td></tr>
<tr><td>👥 Capacity</td><td>${venues[0].capacity}</td><td>${venues[1].capacity}</td></tr>
<tr><td>⚙️ Complexity</td><td>${venues[0].complexity}</td><td>${venues[1].complexity}</td></tr>
<tr><td>💸 Monetization</td><td>${venues[0].monetization}</td><td>${venues[1].monetization}</td></tr>

`;
}

/* RENDER */
function render(){
finance();
renderCurves();
table();
autopilot();
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",e=>{
state[e.target.id]=parseFloat(e.target.value);
render();
});
});

render();

</script>

</body>
</html>
