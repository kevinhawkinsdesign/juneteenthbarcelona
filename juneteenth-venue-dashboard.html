<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juneteenth Venue OS – Optimization Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0b0f19;
color:#e5e7eb;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:22px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
padding:15px;
}

input[type=range]{
width:100%;
margin:8px 0 16px;
}

.metric{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:13px;
}

.badge{
padding:3px 8px;
border-radius:999px;
font-size:11px;
}

.green{background:#16a34a22;color:#4ade80}
.red{background:#dc262622;color:#f87171}

.small{
font-size:12px;
color:#94a3b8;
}

.toggle{
margin-top:10px;
font-size:12px;
color:#93c5fd;
cursor:pointer;
}

.hidden{display:none}

hr{
border:0;
border-top:1px solid rgba(255,255,255,0.08);
margin:12px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🎟 Juneteenth Venue Optimization Engine</h1>

<div class="grid">

<!-- CONTROLS -->
<div class="card">
<h3>Live Controls</h3>

<label>Oversell Rate</label>
<input type="range" min="1" max="1.6" step="0.05" id="oversell"/>

<label>Early Ticket (€)</label>
<input type="range" min="8" max="20" step="1" id="early"/>

<label>Late Ticket (€)</label>
<input type="range" min="10" max="30" step="1" id="late"/>

<label>Early/Late Split</label>
<input type="range" min="0.3" max="0.7" step="0.05" id="split"/>

<div class="small">
Adjust pricing + demand assumptions in real time
</div>
</div>

<!-- VENUES -->
<div class="card" id="roots"></div>
<div class="card" id="carretes"></div>

</div>

<!-- DEMAND CURVE -->
<div class="card" style="margin-top:15px">
<h3>📊 Sell-out Pressure Curve</h3>
<div id="pressure"></div>
</div>

</div>

<script>

const venues=[
{ name:"Roots", capacity:200, cost:2960, bar:true },
{ name:"Carretes 47", capacity:150, cost:2940, bar:false }
];

let state={
oversell:1.4,
early:10,
late:15,
split:0.6
};

function calc(v){

const att = Math.floor(v.capacity * state.oversell * 0.85);

const earlyAtt = Math.floor(att * state.split);
const lateAtt = att - earlyAtt;

const ticket =
earlyAtt * state.early +
lateAtt * state.late;

const bar =
v.bar ? att * 25 * 0.10 : 0;

const total = ticket + bar;

const profit = total - v.cost;

return {att,earlyAtt,lateAtt,ticket,bar,total,profit};
}

function badge(p){
return p>=0
? `<span class="badge green">Profit</span>`
: `<span class="badge red">Loss</span>`;
}

function renderVenue(v, elId){

const r = calc(v);

document.getElementById(elId).innerHTML=`
<h3>${v.name}</h3>

<div class="metric"><span>Attendance</span><b>${r.att}</b></div>
<div class="metric"><span>Ticket Revenue</span><b>€${Math.round(r.ticket)}</b></div>
<div class="metric"><span>Bar Revenue</span><b>€${Math.round(r.bar)}</b></div>

<hr/>

<div class="metric"><span>Total Revenue</span><b>€${Math.round(r.total)}</b></div>
<div class="metric"><span>Cost</span><b>€${v.cost}</b></div>

<div class="metric">
<span>Result</span>
<b>${badge(r.profit)} €${Math.round(r.profit)}</b>
</div>

<div class="toggle" onclick="this.nextElementSibling.classList.toggle('hidden')">
🧠 View Logic
</div>

<div class="hidden small">
Attendance = capacity × oversell × 0.85<br>
Ticket split = early/late pricing model<br>
Bar model (Roots only) = attendance × €25 × 10% share<br>
No scoring system — pure revenue simulation
</div>
`;
}

function renderPressure(){

const levels=[1.0,1.1,1.2,1.3,1.4,1.5,1.6];

document.getElementById("pressure").innerHTML =
levels.map(l=>{

const att = Math.floor(200*l*0.85);
const rev = att * 13;

return `
<div class="metric">
<span>${Math.round(l*100)}% demand</span>
<b>€${Math.round(rev)}</b>
</div>
`;
}).join("");
}

function render(){
renderVenue(venues[0],"roots");
renderVenue(venues[1],"carretes");
renderPressure();
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",e=>{
state[e.target.id]=parseFloat(e.target.value);
render();
});
});

render();

</script>

</body>
</html>
